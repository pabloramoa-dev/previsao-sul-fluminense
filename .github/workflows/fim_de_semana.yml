name: Carrossel Fim de Semana (quinta 18h30 BRT)

on:
  schedule:
    - cron: "30 21 * * 4"   # quinta-feira 18:30 BRT (UTC-3)
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Rodar em modo dry-run (nao publica)"
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  publicar:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Gerar e publicar carrossel de fim de semana
        env:
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
        run: |
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            python -m src.main fim_semana --dry-run
          else
            python -m src.main fim_semana
          fi

      - name: Commit imagens e estado
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/output src/estado.json || true
          git commit -m "chore: fim de semana $(date -u +%Y-%m-%d)" || echo "Nada para commitar"
          git push || echo "Nada para enviar"
