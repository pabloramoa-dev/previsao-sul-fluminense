name: Post Noite (18h BRT)

on:
  schedule:
    - cron: "0 21 * * *"   # 18:00 BRT (UTC-3)
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Rodar em modo dry-run (nao publica)"
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  publicar:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Gerar imagens (sem publicar)
        env:
          PUBLICAR_FASE: gerar
        run: |
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            python -m src.main noite --dry-run
          else
            python -m src.main noite
          fi

      - name: Commit e push das imagens (antes de publicar)
        if: ${{ inputs.dry_run != true }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/output src/estado.json src/historico.json || true
          git commit -m "chore: assets post noite $(date -u +%Y-%m-%d)" || echo "Nada para commitar"
          git push || echo "Nada para enviar"

      - name: Aguardar propagacao do raw.githubusercontent
        if: ${{ inputs.dry_run != true }}
        run: sleep 45

      - name: Publicar no Instagram
        if: ${{ inputs.dry_run != true }}
        env:
          PUBLICAR_FASE: publicar
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
        run: python -c "from src import publicar; publicar.publicar_fila()"
